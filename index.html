<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>M2next</title>
    <meta name="description" content="M2next — официальный сайт проекта." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://m2next.ru/" />
    <meta http-equiv="refresh" content="0; url=https://m2next.ru/" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --fg: #1a1d23;
        --muted: #5c6370;
        --link: #0b57d0;
        --link-hover: #0842a0;
        --loader-accent: #95081c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121418;
          --fg: #e8eaef;
          --muted: #9aa3b2;
          --link: #8ab4ff;
          --link-hover: #adc6ff;
        }
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 1rem;
        line-height: 1.5;
        background: var(--bg);
        color: var(--fg);
      }
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      .loader-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loader {
        width: 2.75rem;
        height: 2.75rem;
        border: 0.22rem solid rgba(0, 0, 0, 0.1);
        border-top-color: var(--loader-accent);
        border-radius: 50%;
        animation: loader-spin 0.75s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        .loader {
          border-color: rgba(255, 255, 255, 0.12);
          border-top-color: var(--loader-accent);
        }
      }
      @keyframes loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="loader-wrap" role="status" aria-live="polite" aria-busy="true" aria-label="Загрузка">
        <div class="loader" aria-hidden="true"></div>
      </div>
      <a href="https://m2next.ru/" class="sr-only" tabindex="-1">https://m2next.ru/</a>
    </main>
  </body>
</html>
