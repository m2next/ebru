<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>M2next</title>
    <meta name="description" content="M2next — официальный сайт проекта." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://m2next.ru/" />
    <meta http-equiv="refresh" content="0; url=https://m2next.ru/" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --fg: #1a1d23;
        --muted: #5c6370;
        --link: #0b57d0;
        --link-hover: #0842a0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121418;
          --fg: #e8eaef;
          --muted: #9aa3b2;
          --link: #8ab4ff;
          --link-hover: #adc6ff;
        }
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 1rem;
        line-height: 1.5;
        background: var(--bg);
        color: var(--fg);
      }
      header {
        text-align: center;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      main {
        text-align: center;
      }
      main p {
        margin: 0;
      }
      a {
        color: var(--link);
        text-decoration-thickness: 0.06em;
        text-underline-offset: 0.2em;
        word-break: break-all;
      }
      a:hover {
        color: var(--link-hover);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>M2next</h1>
    </header>
    <main>
      <p>
        <a href="https://m2next.ru/" rel="noopener noreferrer">https://m2next.ru/</a>
      </p>
    </main>
  </body>
</html>
